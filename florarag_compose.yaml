version: '3.9'

services:

  mysql:
    image: mysql:8.0
    container_name: florarag_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: florarag_platform
    ports:
      - "3306:3306"

  redis:
    image: redis:7
    container_name: florarag_redis
    restart: always
    ports:
      - "6379:6379"
